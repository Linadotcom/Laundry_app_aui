{% extends 'layout.html' %}

{% block content %}
<div class="text-center mb-5">
    <h2 class="fw-bold">Pricing Guide</h2>
    <p class="text-muted">Transparent pricing for all your laundry needs.</p>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card p-0 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th class="ps-4 py-3">Service Type</th>
                            <th class="pe-4 py-3 text-end">Price / kg</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for p in pricing %}
                        <tr>
                            <td class="ps-4 py-3"><span class="badge bg-light text-dark border">{{ p.service_type }}</span></td>
                            <td class="pe-4 py-3 text-end fw-bold text-primary">{{ p.price_per_kg }} Dhs</td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="2" class="text-center p-4 text-muted">Pricing information is currently unavailable.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
